<div
  class="grid animate-pulse grid-cols-1 md:grid-cols-2 justify-items-center lg:grid-cols-3 gap-6"
>
  @for (item of [1, 2, 3, 4, 5, 6]; track $index) {
    <div class="bg-white w-96 h-64 rounded-lg p-5 flex flex-col space-y-5">
      <div class="w-64 h-32 rounded-sm bg-skeleton"></div>
      <div class="flex flex-col space-y-8">
        <h2 class="bg-skeleton rounded-sm w-48 h-4"></h2>
        <p class="bg-skeleton rounded-sm w-32 h-4"></p>
      </div>
    </div>
  }
</div>
