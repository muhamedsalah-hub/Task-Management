<section class="w-80 sm:w-120 mx-auto">
  <div class="my-5 text-center">
    <h1 class="headline-lg text-textPrimary">Create your workspace</h1>
    <p class="body-md text-textSecondary">
      Join the curated environment for institutional trust and task precision.
    </p>
  </div>

  <form class="my-5" (ngSubmit)="signUpSubmission()">
    <div class="flex flex-col space-y-5">
      <div>
        <label for="fullName" class="label-sm text-inputLabel">Full Name</label>
        <input
          class="title-md input bg-bgInput w-full outline-0"
          id="fullName"
          formControlName=""
          type="text"
          placeholder="Enter your full name"
        />
        <span
          class="label-sm font-light text-inputLabel tracking-normal lowercase"
          >3-50 characters , letters only</span
        >
      </div>
      <div>
        <div class="flex justify-between items-center">
          <label for="jobTitle" class="label-sm text-inputLabel"
            >Job Title
          </label>
          <span
            class="label-sm font-light text-bgPrimary tracking-normal lowercase"
            >( optional )</span
          >
        </div>

        <input
          class="title-md input bg-bgInput w-full outline-0"
          id="jobTitle"
          formControlName=""
          type="text"
          placeholder="e.g. Project Manager"
        />
      </div>
      <div>
        <label for="email" class="label-sm text-inputLabel">Email</label>
        <input
          class="title-md input bg-bgInput w-full outline-0"
          id="email"
          formControlName=""
          type="email"
          placeholder="yourname@comapny.com"
        />
      </div>
      <div
        class="flex flex-col space-y-5 sm:flex-nowrap sm:flex-row sm:space-y-0 sm:space-x-4"
      >
        <div>
          <label for="password" class="label-sm text-inputLabel"
            >Password</label
          >
          <div class="flex items-center justify-between input">
            <input
              formControlName="password"
              class="title-md bg-bgInput w-full outline-0"
              id="password"
              type="password"
              placeholder="Password"
              autocomplete="off"
            />
            <fa-icon [icon]="faEye"></fa-icon>
          </div>
        </div>
        <div>
          <label for="confirmPassword" class="label-sm text-inputLabel"
            >Confirm Password</label
          >
          <input
            class="title-md input bg-bgInput w-full outline-0"
            id="confirmPassword"
            formControlName=""
            type="password"
            placeholder="Repeat your password"
          />
        </div>
      </div>

      <div
        class="rounded-md flex flex-col body-sm font-light text-inputLabel tracking-normal lowercase bg-[#E8EDFF] p-4"
      >
        <div>
          <span>At least 8 characters</span>
        </div>
        <div>
          <span>One uppercase,lowercase, and digit</span>
        </div>
        <div>
          <span>One special character</span>
        </div>
      </div>

      <div>
        <button class="btn-primary w-full">
          <span class="mx-1">Create Account</span>
        </button>
      </div>
    </div>
  </form>

  <div class="flex justify-center items-center space-x-10">
    <span class="body-md text-textSecondary">Already have an account ?</span>
    <button
      class="text-bgPrimary body-md cursor-pointer underline font-semibold"
    >
      Log in
    </button>
  </div>
</section>
