<aside
  class="fixed top-0 left-0 z-50 w-56 h-full flex flex-col justify-between items-center bg-bgSurface-low p-2 transition-all duration-300 ease-in-out lg:translate-x-0"
  [ngClass]="{
    '-translate-x-full lg:translate-x-0': !isMobileSidebarOpen,
    'translate-x-0': isMobileSidebarOpen,
    'lg:w-20': isDesktopCollapsed,
    'lg:w-64': !isDesktopCollapsed,
  }"
>
  <!-- Icons -->
  <div class="flex flex-col justify-center items-center space-y-6">
    @for (item of icons; track item.id) {
      <div
        [routerLink]="item.link"
        routerLinkActive="!text-[#0052CC] bg-white"
        class="flex items-center rounded-md cursor-pointer hover:bg-bgSurface-highest text-[#434654]"
        [ngClass]="{
          'w-52': isMobileSidebarOpen,
          'lg:w-60': !isDesktopCollapsed,
        }"
      >
        <div class="w-12 h-12 flex justify-center items-center">
          <svg [attr.width]="item.width" [attr.height]="item.height">
            <use [attr.href]="item.href"></use>
          </svg>
        </div>

        @if (!isDesktopCollapsed || isMobileSidebarOpen) {
          <span
            class="text-textPrimary"
            [class]="item.id === 1 ? 'headline-lg' : 'body-md font-bold!'"
          >
            {{ item.title }}
          </span>
        }
      </div>
    }
  </div>

  <!-- Footer -->
  <div
    class="my-5 flex flex-col space-y-8"
    [class.w-56]=" isMobileSidebarOpen"
    [class.w-60]=" !isDesktopCollapsed"
  >
    <div
      (click)="toggleDesktopEmission()"
      (click)="closeMobileEmission()"
      class="flex items-center cursor-pointer hover:bg-bgSurface-highest"
    >
      <div class="w-12 h-12 flex items-center justify-center">
        <svg width="14" height="20">
          <use
            [attr.href]="
              isDesktopCollapsed && !isMobileSidebarOpen
                ? '#arrowRight'
                : '#arrowLeft'
            "
          ></use>
        </svg>
      </div>

      @if (!isDesktopCollapsed || isMobileSidebarOpen) {
        <span>Collapse</span>
      }
    </div>

    <div class="flex items-center cursor-pointer hover:bg-bgSurface-highest">
      <div (click)="logoutSubmission()" class="w-12 h-12 flex justify-center items-center">
        <svg width="18" height="18">
          <use href="#logout"></use>
        </svg>
      </div>

      @if (!isDesktopCollapsed || isMobileSidebarOpen) {
        <span class="text-error">Logout</span>
      }
    </div>
  </div>

</aside>
