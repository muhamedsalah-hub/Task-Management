<nav
  class="fixed bottom-0 left-0 right-0 px-6 py-3 bg-bgSurface-low flex justify-between items-center"
>
  @for (item of icons; track item.id) {
    @if (item.id !== 1) {
      <div
        [routerLink]="item.link"
        class="text-[#434654] cursor-pointer flex flex-col justify-between items-center spaxe-y-1"
        routerLinkActive="!text-[#0052CC]"
      >
        <svg [attr.width]="item.width" [attr.height]="item.height">
          <use [attr.href]="item.href"></use>
        </svg>
        <span class="text-sm">{{ item.title }}</span>
      </div>
    }
  }
</nav>
