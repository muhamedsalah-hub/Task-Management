<div
  [class]="isCollapsed ? 'w-20' : 'w-64'"
  class="hidden lg:flex lg:flex-col justify-between items-center min-h-full bg-bgSurface-low p-2 transition-all duration-300 ease-in-out overflow-hidden"
>
  <div class="flex flex-col justify-center items-center space-y-6">
    @for (item of icons; track item.id) {
      <div
        [class.w-56]="!isCollapsed"
        [routerLink]="item.link"
        class="text-[#434654] cursor-pointer hover:bg-bgSurface-highest flex items-center"
        routerLinkActive="!text-[#0052CC] bg-white"
      >
        <div class="w-12 h-12 flex justify-center items-center">
          <svg [attr.width]="item.width" [attr.height]="item.height">
            <use [attr.href]="item.href"></use>
          </svg>
        </div>

        @if (!isCollapsed) {
          <span
            class="text-textPrimary"
            [class]="item.id === 1 ? ' headline-lg' : 'body-md font-bold!'"
          >
            {{ item.title }}
          </span>
        }
      </div>
    }
  </div>

  <div [class.w-56]="!isCollapsed" class="my-5 flex flex-col space-y-8">
    <div
      (click)="handleCollapse()"
      class="flex items-center cursor-pointer hover:bg-bgSurface-highest"
    >
      @if (isCollapsed) {
        <div class="w-12 h-12 flex items-center justify-center">
          <svg
            class="cursor-pointer"
            width="12"
            height="20"
            viewBox="0 0 12 20"
          >
            <use href="#arrowRight"></use>
          </svg>
        </div>
      } @else {
        <div
          class="flex items-center cursor-pointer hover:bg-bgSurface-highest"
        >
          <div
            (click)="handleCollapse()"
            class="w-12 h-12 flex items-center justify-center"
          >
            <svg
              class="cursor-pointer"
              width="12"
              height="20"
              viewBox="0 0 12 20"
            >
              <use href="#arrowLeft"></use>
            </svg>
          </div>

          <span>Collapse</span>
        </div>
      }
    </div>
    <div class="flex items-center cursor-pointer hover:bg-bgSurface-highest">
      <div class="w-12 h-12 flex justify-center items-center">
        <svg class="cursor-pointer" width="18" height="18" viewBox="0 0 18 18">
          <use href="#logout"></use>
        </svg>
      </div>

      @if (!isCollapsed) {
        <span class="text-error">Logout</span>
      }
    </div>
  </div>
</div>
